<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digiver — Operations Control</title>
    <style>
        :root {
            /* PALETA DE COLORES */
            --bg-body: #f8f9fa;
            --surface: #ffffff;
            --surface-hover: #f3f4f6;
            
            --text-main: #111827;
            --text-muted: #6b7280;
            
            --brand-red: #da291c;
            --brand-red-hover: #b31d14;
            
            --border-color: #e5e7eb;
            --border-strong: #d1d5db;
            
            /* ACENTOS DE ACCIÓN */
            --action-green: #10b981;
            --action-green-bg: #ecfdf5;
            --action-yellow: #f59e0b;
            --action-yellow-bg: #fffbe2;
            --action-cyan: #0ea5e9;
            --action-cyan-bg: #f0f9ff;
            
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-size: 10.5pt;
            padding: 20px;
        }

        /* HEADER ELEGANTE CON IDENTIDAD DIGIVER */
        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto 20px auto;
            background: var(--surface);
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            border-left: 6px solid var(--brand-red);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo .logo-badge {
            background: var(--brand-red);
            color: white;
            font-weight: 900;
            font-size: 11pt;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            letter-spacing: 0.5px;
        }

        .brand-logo h1 {
            font-size: 15pt;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: var(--text-main);
        }

        .brand-logo p {
            font-size: 8.5pt;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* BOTONES DE ALTO RENDIMIENTO */
        button {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border-strong);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 9.5pt;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s ease, border-color 0.1s ease;
        }

        button:hover {
            background: var(--surface-hover);
        }

        button.btn-primary {
            background: var(--brand-red);
            border-color: var(--brand-red);
            color: white;
        }

        button.btn-primary:hover {
            background: var(--brand-red-hover);
            border-color: var(--brand-red-hover);
        }

        button.btn-action-cyan {
            background: var(--action-cyan-bg);
            border-color: var(--action-cyan);
            color: var(--action-cyan);
        }

        button.btn-action-cyan:hover {
            background: #e0f2fe;
        }

        .badge-shortcut {
            background: rgba(0,0,0,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 8pt;
        }

        button.btn-primary .badge-shortcut {
            background: rgba(255,255,255,0.25);
            color: white;
        }

        /* ESTRUCTURA PRINCIPAL DE PANELES */
        .workspace-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
        }

        .panel-header {
            font-weight: 800;
            font-size: 11pt;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg-body);
            padding-bottom: 10px;
        }

        /* TABLA DE EDICIÓN EN LÍNEA ULTRALIGERA */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        .digiver-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .digiver-table th {
            padding: 10px 12px;
            color: var(--text-muted);
            font-size: 8.5pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-body);
            border-bottom: 1px solid var(--border-color);
        }

        .digiver-table td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 9.5pt;
        }

        .digiver-table tr:hover td {
            background: var(--surface-hover);
        }

        /* FILA DINÁMICA DE ENTRADA (INLINE EDITOR) */
        .inline-editor-row {
            background: #fef2f2 !important;
            display: none;
            border-left: 4px solid var(--brand-red);
        }

        .inline-editor-row.active {
            display: table-row;
        }

        .inline-editor-row input, .inline-editor-row select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            color: var(--text-main);
            padding: 7px 10px;
            border-radius: var(--radius-sm);
            font-size: 9pt;
            outline: none;
        }

        .inline-editor-row input:focus, .inline-editor-row select:focus {
            border-color: var(--brand-red);
            box-shadow: 0 0 0 2px rgba(218, 41, 28, 0.15);
        }

        /* BADGES Y ETIQUETAS DE ACCIÓN */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 8pt;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-venta { background: var(--action-green-bg); color: var(--action-green); border: 1px solid #a7f3d0; }
        .badge-migracion { background: var(--action-cyan-bg); color: var(--action-cyan); border: 1px solid #bae6fd; }
        .badge-otros { background: var(--action-yellow-bg); color: #b45309; border: 1px solid #fde68a; }

        /* SECCIÓN DE METAS Y PROGRESO */
        .kpi-item {
            margin-bottom: 16px;
        }

        .kpi-meta-header {
            display: flex;
            justify-content: space-between;
            font-size: 9pt;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .kpi-bar-bg {
            height: 9px;
            background: var(--bg-body);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .kpi-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--brand-red);
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        .kpi-bar-fill.fill-green { background: var(--action-green); }
        .kpi-bar-fill.fill-cyan { background: var(--action-cyan); }
        .kpi-bar-fill.fill-yellow { background: var(--action-yellow); }

        /* TOAST NOTIFICACIÓN LIGERO */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--text-main);
            color: white;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-size: 9pt;
            font-weight: 700;
            display: none;
            border-left: 4px solid var(--action-green);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="workspace-header">
        <div class="brand-logo">
            <span class="logo-badge">DV</span>
            <div>
                <h1>Digiver</h1>
                <p>Gestión de Turnos & Objetivos Operativos</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-primary" onclick="toggleInlineEditor(true)">
                + Nueva Gestión <span class="badge-shortcut">Shift + N</span>
            </button>
            <button class="btn-action-cyan" onclick="cargarDatos()">
                🔄 Sincronizar
            </button>
        </div>
    </div>

    <div class="workspace-layout">
        
        <div class="panel">
            <div class="panel-header">
                <span>Historial de Gestiones</span>
                <span id="totalGestionesLabel" style="color: var(--text-muted); font-weight: normal; font-size: 8.5pt;">0 registros</span>
            </div>

            <div class="table-container">
                <table class="digiver-table">
                    <thead>
                        <tr>
                            <th style="width: 150px;">Cliente</th>
                            <th style="width: 110px;">Cédula</th>
                            <th style="width: 80px;">Turno</th>
                            <th style="width: 120px;">Trámite</th>
                            <th style="width: 110px;">Subtipo</th>
                            <th>Detalles / Observación</th>
                            <th style="width: 70px;">Hora</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="inline-editor-row" id="inlineRow">
                            <td><input type="text" id="inNombre" placeholder="Nombre cliente..."></td>
                            <td><input type="text" id="inCedula" placeholder="Cédula / NIT..."></td>
                            <td><input type="text" id="inTurno" placeholder="Ej: E34" style="text-transform: uppercase; font-weight: bold;"></td>
                            <td>
                                <select id="inAccion" onchange="handleAccionChange()">
                                    <option value="Venta">Venta</option>
                                    <option value="Migración">Migración</option>
                                    <option value="Titularidad">Titularidad</option>
                                    <option value="Traslado">Traslado</option>
                                    <option value="Suspensión">Suspensión</option>
                                    <option value="Cancelación">Cancelación</option>
                                </select>
                            </td>
                            <td>
                                <select id="inSubtipo">
                                    <option value="Hogar">Hogar</option>
                                    <option value="Pospago">Pospago</option>
                                    <option value="Equipo">Equipo</option>
                                </select>
                            </td>
                            <td><input type="text" id="inDetalles" placeholder="Notas del caso..." onkeydown="handleKeyDown(event)"></td>
                            <td>
                                <button class="btn-primary" style="padding: 4px 8px; font-size: 8pt;" onclick="guardarRegistroInline()">Guardar</button>
                            </td>
                        </tr>

                        <tbody id="tableBody">
                            <tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Cargando espacio de trabajo...</td></tr>
                        </tbody>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span>Cumplimiento del Mes</span>
                <span id="mesLabel" style="color: var(--brand-red); font-size: 8.5pt; font-weight: 800;">-</span>
            </div>

            <div id="kpiList">
                <p style="color: var(--text-muted); font-size: 9pt;">Cargando objetivos...</p>
            </div>
        </div>

    </div>

    <div class="toast" id="toast">Registro guardado en Digiver Cloud</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbye6AFy7yJ64Aff2J7DMOqnc5rzW34UwzNEFcocPllwi2wuPt2EjWdun_hYnaP14DuO/exec";

        // GESTIÓN DE ATAJOS DE TECLADO
        window.addEventListener('keydown', (e) => {
            if (e.shiftKey && (e.key === 'N' || e.key === 'n')) {
                if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    toggleInlineEditor(true);
                }
            }
            if (e.key === 'Escape') {
                toggleInlineEditor(false);
            }
        });

        function toggleInlineEditor(forceState) {
            const row = document.getElementById("inlineRow");
            const isVisible = row.classList.contains("active");
            
            if (forceState === false || (forceState === undefined && isVisible)) {
                row.classList.remove("active");
            } else {
                row.classList.add("active");
                setTimeout(() => document.getElementById("inNombre").focus(), 50);
            }
        }

        function handleAccionChange() {
            const accion = document.getElementById("inAccion").value;
            const selectSubtipo = document.getElementById("inSubtipo");
            if (accion === "Venta") {
                selectSubtipo.disabled = false;
            } else {
                selectSubtipo.disabled = true;
                selectSubtipo.value = "";
            }
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                guardarRegistroInline();
            }
        }

        // LECTURA ASÍNCRONA DE DATOS MEDIANTE JSONP
        function cargarDatos() {
            const currentMonth = new Date().toISOString().substring(0, 7);
            document.getElementById("mesLabel").innerText = currentMonth;

            const oldScript = document.getElementById("jsonpScript");
            if (oldScript) oldScript.remove();

            const script = document.createElement("script");
            script.id = "jsonpScript";
            script.src = `${API_URL}?callback=procesarDatosDigiver&_=${Date.now()}`;
            script.onerror = function() {
                console.error("Error al conectar con la API de Digiver");
            };
            document.body.appendChild(script);
        }

        function procesarDatosDigiver(data) {
            if (data && data.status === "success") {
                const currentMonth = new Date().toISOString().substring(0, 7);
                renderTabla(data.gestiones || []);
                renderKPIs(data.gestiones || [], data.metas || [], currentMonth);
            }
        }

        function renderTabla(gestiones) {
            const body = document.getElementById("tableBody");
            document.getElementById("totalGestionesLabel").innerText = `${gestiones.length} registros cargados`;

            if (gestiones.length === 0) {
                body.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">No hay gestiones registradas.</td></tr>';
                return;
            }

            const reversed = [...gestiones].reverse();
            let html = "";
            reversed.forEach(g => {
                let badgeClass = "badge-otros";
                if (g.Accion === "Venta") badgeClass = "badge-venta";
                if (g.Accion === "Migración") badgeClass = "badge-migracion";

                html += `
                    <tr>
                        <td><b>${g.Nombre || '—'}</b></td>
                        <td>${g.Cedula || '—'}</td>
                        <td><span style="font-family: monospace; font-weight: bold; color: var(--brand-red);">${g.Turno}</span></td>
                        <td><span class="badge ${badgeClass}">${g.Accion}</span></td>
                        <td>${g.Subtipo ? `<b>${g.Subtipo}</b>` : '—'}</td>
                        <td style="color: var(--text-muted); font-size: 8.5pt;">${g.Detalles || '—'}</td>
                        <td><span style="color: var(--text-muted); font-size: 8pt;">${g.Hora || ''}</span></td>
                    </tr>
                `;
            });
            body.innerHTML = html;
        }

        function renderKPIs(gestiones, metas, currentMonth) {
            const kpiList = document.getElementById("kpiList");
            const gestionesMes = gestiones.filter(g => g.Fecha && g.Fecha.startsWith(currentMonth));
            
            const conteo = {
                Hogar: gestionesMes.filter(g => g.Subtipo === "Hogar").length,
                Pospago: gestionesMes.filter(g => g.Subtipo === "Pospago").length,
                Equipo: gestionesMes.filter(g => g.Subtipo === "Equipo").length,
                Migración: gestionesMes.filter(g => g.Accion === "Migración").length,
                Otros: gestionesMes.filter(g => g.Accion !== "Venta" && g.Accion !== "Migración").length
            };

            const metasMes = metas.filter(m => m.mes === currentMonth);

            let html = "";
            const categorias = ["Hogar", "Pospago", "Equipo", "Migración", "Otros"];

            categorias.forEach(cat => {
                const metaObj = metasMes.find(m => m.indicador === cat);
                const target = metaObj ? metaObj.cantidad : 0;
                const actual = conteo[cat] || 0;
                const pct = target > 0 ? Math.min(100, Math.round((actual / target) * 100)) : 0;

                let fillClass = "";
                if (cat === "Hogar" || cat === "Pospago") fillClass = "fill-green";
                if (cat === "Migración") fillClass = "fill-cyan";
                if (cat === "Otros") fillClass = "fill-yellow";

                html += `
                    <div class="kpi-item">
                        <div class="kpi-meta-header">
                            <span>${cat}</span>
                            <span><b>${actual}</b> / ${target} (${pct}%)</span>
                        </div>
                        <div class="kpi-bar-bg">
                            <div class="kpi-bar-fill ${fillClass}" style="width: ${pct}%;"></div>
                        </div>
                    </div>
                `;
            });

            kpiList.innerHTML = html || '<p style="color: var(--text-muted); font-size: 9pt;">Sin metas configuradas para este período.</p>';
        }

        // GUARDADO EN LÍNEA
        function guardarRegistroInline() {
            const nombre = encodeURIComponent(document.getElementById("inNombre").value.trim());
            const cedula = encodeURIComponent(document.getElementById("inCedula").value.trim());
            const turno = encodeURIComponent(document.getElementById("inTurno").value.trim().toUpperCase());
            const accion = encodeURIComponent(document.getElementById("inAccion").value);
            const subtipo = encodeURIComponent(document.getElementById("inSubtipo").value);
            const detalles = encodeURIComponent(document.getElementById("inputDetalles") ? document.getElementById("inputDetalles").value.trim() : document.getElementById("inDetalles").value.trim());

            if (!turno) {
                alert("Ingresa el código del turno para continuar.");
                return;
            }

            const url = `${API_URL}?nombre=${nombre}&cedula=${cedula}&turno=${turno}&turnoCorrecto=Sí&accion=${accion}&subtipo=${subtipo}&detalles=${detalles}`;

            fetch(url, { method: "GET", mode: "no-cors" })
            .then(() => {
                showToast();
                document.getElementById("inNombre").value = "";
                document.getElementById("inCedula").value = "";
                document.getElementById("inTurno").value = "";
                document.getElementById("inDetalles").value = "";
                toggleInlineEditor(false);
                setTimeout(cargarDatos, 1000);
            });
        }

        function showToast() {
            const t = document.getElementById("toast");
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
